{% extends "base.html" %}
{% block content %}
<div class="max-w-xl mx-auto">
    <form action="/preview" method="POST" enctype="multipart/form-data" id="uploadForm">
        <div id="dropZone"
             class="border-2 border-dashed border-gray-300 rounded-xl p-12 text-center cursor-pointer
                    hover:border-blue-400 hover:bg-blue-50 transition-colors">
            <svg class="mx-auto h-12 w-12 text-gray-400 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                      d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"/>
            </svg>
            <p class="text-gray-600 mb-2">ここにファイルをドラッグ&ドロップ</p>
            <p class="text-gray-400 text-sm mb-4">または</p>
            <label class="inline-block px-6 py-2 bg-blue-600 text-white rounded-lg cursor-pointer hover:bg-blue-700 transition-colors">
                ファイルを選択
                <input type="file" name="excel_file" accept=".xlsx,.xls,.csv" class="hidden" id="fileInput">
            </label>
            <p class="text-gray-400 text-xs mt-4">.xlsx ファイル対応</p>
        </div>
        <div id="fileInfo" class="hidden mt-4 p-4 bg-white rounded-lg border border-gray-200">
            <div class="flex items-center justify-between">
                <div class="flex items-center gap-3">
                    <svg class="h-8 w-8 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                    </svg>
                    <div>
                        <p id="fileName" class="text-sm font-medium text-gray-700"></p>
                        <p id="fileSize" class="text-xs text-gray-400"></p>
                    </div>
                </div>
                <button type="button" id="clearFile" class="text-gray-400 hover:text-red-500">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
        <button type="submit" id="submitBtn" disabled
                class="mt-6 w-full py-3 bg-blue-600 text-white rounded-lg font-medium
                       disabled:bg-gray-300 disabled:cursor-not-allowed
                       hover:bg-blue-700 transition-colors">
            プレビューを表示
        </button>
    </form>
</div>

<script>
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');
const fileInfo = document.getElementById('fileInfo');
const fileName = document.getElementById('fileName');
const fileSize = document.getElementById('fileSize');
const submitBtn = document.getElementById('submitBtn');
const clearFile = document.getElementById('clearFile');
const uploadForm = document.getElementById('uploadForm');

function showFile(file) {
    fileName.textContent = file.name;
    fileSize.textContent = (file.size / 1024).toFixed(1) + ' KB';
    fileInfo.classList.remove('hidden');
    submitBtn.disabled = false;
}

function clearSelection() {
    fileInput.value = '';
    fileInfo.classList.add('hidden');
    submitBtn.disabled = true;
}

fileInput.addEventListener('change', (e) => {
    if (e.target.files.length) showFile(e.target.files[0]);
});

clearFile.addEventListener('click', clearSelection);

dropZone.addEventListener('dragover', (e) => {
    e.preventDefault();
    dropZone.classList.add('border-blue-400', 'bg-blue-50');
});

dropZone.addEventListener('dragleave', () => {
    dropZone.classList.remove('border-blue-400', 'bg-blue-50');
});

dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('border-blue-400', 'bg-blue-50');
    const files = e.dataTransfer.files;
    if (files.length) {
        fileInput.files = files;
        showFile(files[0]);
    }
});

dropZone.addEventListener('click', (e) => {
    if (e.target.tagName !== 'INPUT' && e.target.tagName !== 'LABEL') {
        fileInput.click();
    }
});

uploadForm.addEventListener('submit', () => {
    submitBtn.disabled = true;
    submitBtn.textContent = '処理中...';
});
</script>
{% endblock %}
